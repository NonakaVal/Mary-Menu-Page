<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pastelaria | Cardápio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f5f5f4;
        }
        .serif {
            font-family: 'Playfair Display', serif;
        }
        
        /* Cabeçalho com imagem de fundo */
        .header-bg {
            height: 110px;
            background: url('https://images.unsplash.com/photo-1604911965086-2b7398fa13f6?q=80&w=2000&auto=format&fit=crop') center/cover;
            position: relative;
        }
        .header-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.2) 80%, #f5f5f4);
            pointer-events: none;
        }

        /* Logo redondo */
        .logo-wrapper {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            background: white;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 3px solid white;
            margin-top: -44px;
            position: relative;
            z-index: 20;
        }
        .logo-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Categorias */
        .category-card {
            transition: all 0.2s ease;
        }
        .category-card.active {
            background-color: #f5f5f4;
            transform: scale(1.02);
        }
        .category-card.active span {
            color: #1c1917;
        }
        
        /* Itens do menu - VERSÃO MAIS COMPACTA */
        .menu-section-title {
            padding: 8px 16px;
            font-size: 13px;
            letter-spacing: 0.5px;
            font-weight: 600;
            text-align: center;
            text-decoration: underline 1px #f97316;
            color: #000000;
            background: #f5f5f4;
        }
        .menu-item {
            padding: 6px 14px;
            border-bottom: 1px solid #f0f0f0;
            background: white;
        }
        .menu-item:last-child {
            border-bottom: none;
        }
        .price-tag {
            font-weight: 600;
            color: #0c0a09;
            white-space: nowrap;
            font-size: 13px;
        }
        .item-description {
            font-size: 10px;
            color: #78716c;
            margin-top: 2px;
            line-height: 1.3;
        }
        .addon-note {
            font-size: 11px;
            color: #f97316;
            margin-left: 6px;
            font-weight: 500;
        }
        
        /* Nome do item mais compacto */
        .menu-item .font-medium {
            font-size: 14px;
        }
        
        /* Animações */
        .fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-stone-50 text-stone-800 antialiased">

    <!-- Header -->
    <header class="relative">
        <div class="header-bg"></div>
        <div class="flex justify-center">
            <div class="logo-wrapper">
                <img src="Assets/logo-banner.png" 
                     alt="Logo" 
                     class="logo-image"
                     onerror="this.src='https://via.placeholder.com/88?text=Pastel'">
            </div>
        </div>
        <div class="text-center pb-4 px-4">
            <h1 class="text-2xl font-bold text-stone-900 serif">Pastelaria</h1>
            <p class="text-xs text-stone-500 uppercase tracking-[0.2em] font-medium mt-1">Pastéis & Salgados</p>
        </div>
    </header>

    <!-- Category Selector -->
    <section class="sticky top-0 z-40 bg-white/95 backdrop-blur-sm border-b border-stone-200 py-2 px-4 shadow-sm">
        <div class="max-w-md mx-auto">
            <div class="flex justify-center gap-2">
                <!-- Pastéis -->
                <button onclick="selectCategory('pasteis')" 
                        id="cat-pasteis"
                        class="category-card active flex flex-col items-center gap-1 p-2 rounded-xl flex-1 max-w-[90px]">
                    <div class="w-12 h-12 rounded-xl bg-amber-50 flex items-center justify-center shadow-sm">
                        <i data-lucide="utensils" class="w-5 h-5 text-amber-700"></i>
                    </div>
                    <span class="text-[10px] font-semibold text-stone-800 uppercase">Pastéis</span>
                </button>

                <!-- Salgados -->
                <button onclick="selectCategory('salgados')" 
                        id="cat-salgados"
                        class="category-card flex flex-col items-center gap-1 p-2 rounded-xl flex-1 max-w-[90px] bg-white">
                    <div class="w-12 h-12 rounded-xl bg-orange-50 flex items-center justify-center shadow-sm">
                        <i data-lucide="sandwich" class="w-5 h-5 text-orange-600"></i>
                    </div>
                    <span class="text-[10px] font-semibold text-stone-500 uppercase">Salgados</span>
                </button>

                <!-- Bebidas -->
                <button onclick="selectCategory('bebidas')" 
                        id="cat-bebidas"
                        class="category-card flex flex-col items-center gap-1 p-2 rounded-xl flex-1 max-w-[90px] bg-white">
                    <div class="w-12 h-12 rounded-xl bg-emerald-50 flex items-center justify-center shadow-sm">
                        <i data-lucide="cup-soda" class="w-5 h-5 text-emerald-600"></i>
                    </div>
                    <span class="text-[10px] font-semibold text-stone-500 uppercase">Bebidas</span>
                </button>
            </div>
        </div>
    </section>

    <!-- Menu Content -->
    <main class="max-w-md mx-auto bg-white rounded-t-2xl shadow-sm mt-3 min-h-[400px]">
        <div id="menu-container">
            <!-- Menu será renderizado aqui -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="max-w-md mx-auto text-center py-4 px-4 text-xs text-stone-400">
        <p>© 2026 Pastelaria da Mary</p>
    </footer>

    <script>
        // Dados do cardápio - versão simplificada
        const menuData = {
            pasteis: [
                // Simples
                { name: "Carne", description: "Carne moída temperada", price: 8.00 },
                { name: "Queijo", description: "Queijo mussarela derretido", price: 8.00 },
                { name: "Frango", description: "Frango desfiado", price: 8.00 },
                { name: "Pizza", description: "Molho de tomate, queijo e orégano", price: 8.00 },
                
                // Combos
                { name: "Carne c/ Queijo", description: "Carne moída e mussarela", price: 10.00 },
                { name: "Frango c/ Queijo", description: "Frango desfiado + queijo", price: 10.00 },
                { name: "Frango c/ Catupiry", description: "Frango com requeijão", price: 10.00 },
                { name: "Calabresa c/ Queijo", description: "Calabresa e mussarela", price: 10.00 },
                { name: "Portuguesa", description: "Presunto, queijo, ovo e tomate", price: 10.00 },
                
                // Especiais
                { name: "Costela", description: "Costela desfiada", price: 15.00 },
                { name: "Costela c/ Queijo", description: "Costela com queijo", price: 15.00 },
                { name: "Bacon", description: "Bacon crocante", price: 15.00 },
                { name: "X-Tudo", description: "Carne, queijo, presunto, calabresa, frango, cheddar, catupiry, ovo", price: 15.00 },
                { name: "Strogonoff de Frango", description: "Strogonoff cremoso", price: 15.00 },
                { name: "Carne Seca", description: "Carne seca desfiada", price: 15.00 },
                { name: "Pernil", description: "Pernil desfiado", price: 15.00 },
                { name: "Palmito", description: "Palmito pupunha", price: 15.00 },
                
                // Doces
                { name: "Brigadeiro", description: "Chocolate meio amargo", price: 12.00 },
                { name: "Prestígio", description: "Coco com chocolate", price: 12.00 },
                { name: "Doce de Leite", description: "Doce de leite cremoso", price: 12.00 },
                { name: "Brigadeiro c/ Morango", description: "Brigadeiro com morango", price: 12.00 },
                { name: "Banana c/ Canela", description: "Banana caramelizada", price: 12.00 },
                { name: "Nutella", description: "Creme de avelã", price: 15.00 },
                { name: "Romeu e Julieta", description: "Goiabada com queijo", price: 12.00 }
            ],
            
            salgados: [
                { name: "Coxinha de Frango", description: "Massa tradicional recheada", price: 7.00 },
                { name: "Coxinha de Costela", description: "Recheada com costela", price: 9.00 },
                { name: "Risoles de Presunto/Queijo", description: "Massa leve", price: 7.00 },
                { name: "Risoles de Carne", description: "Recheado com carne moída", price: 7.00 },
                { name: "Bolinha de Queijo", description: "Queijo coalho empanado", price: 8.00 },
                { name: "Kibe", description: "Trigo com carne e hortelã", price: 7.00 },
                { name: "Kibe c/ Requeijão", description: "Kibe recheado", price: 8.00 },
                { name: "Esfiha de Carne", description: "Aberta com carne e tomate", price: 6.00 },
                { name: "Esfiha de Frango", description: "Aberta com frango", price: 6.00 },
                { name: "Enroladinho de Salsicha", description: "Massa folhada", price: 6.00 },
                { name: "Folhado de Calabresa", description: "Calabresa e queijo", price: 8.00 },
                { name: "Pão de Queijo", description: "Tradicional mineiro", price: 4.00 },
                { name: "Croquete de Carne", description: "Tempero caseiro", price: 6.00 }
            ],
            
            bebidas: [
                { name: "Refrigerante Lata", description: "Coca, Guaraná, Sprite (350ml)", price: 6.00 },
                { name: "Refrigerante 600ml", description: "Coca ou Guaraná", price: 9.00 },
                { name: "Água sem Gás", description: "500ml", price: 4.00 },
                { name: "Água com Gás", description: "500ml", price: 5.00 },
                { name: "Suco Natural Laranja", description: "Copo 300ml", price: 9.00 },
                { name: "Suco Natural Maracujá", description: "Copo 300ml", price: 9.00 },
                { name: "Suco Natural Limão", description: "Copo 300ml com hortelã", price: 8.00 },
                { name: "Café Expresso", description: "Café forte", price: 5.00 },
                { name: "Café com Leite", description: "Café com leite", price: 6.00 },
                { name: "Cappuccino", description: "Espresso com leite", price: 8.00 },
                { name: "Chá Gelado", description: "Limão, pêssego (500ml)", price: 7.00 },
                { name: "Caldo de Cana", description: "Copo 300ml", price: 6.00 },
                { name: "Água de Coco", description: "Copo 300ml", price: 7.00 }
            ]
        };

        const categoryTitles = {
            pasteis: "Pastéis",
            salgados: "Salgados", 
            bebidas: "Bebidas"
        };

        let currentCategory = 'pasteis';

        // Função para agrupar pastéis por tipo
        function groupPasteisByType(items) {
            const simples = [];
            const combos = [];
            const especiais = [];
            const doces = [];
            
            items.forEach(item => {
                const name = item.name.toLowerCase();
                if (name.includes('brigadeiro') || name.includes('prestígio') || name.includes('doce de leite') || 
                    name.includes('banana') || name.includes('nutella') || name.includes('romeu')) {
                    doces.push(item);
                } else if (item.price === 8.00 && !name.includes('c/')) {
                    simples.push(item);
                } else if (item.price === 10.00 || name.includes('c/ queijo') || name.includes('c/ catupiry') || name.includes('portuguesa')) {
                    combos.push(item);
                } else {
                    especiais.push(item);
                }
            });
            
            return { simples, combos, especiais, doces };
        }

        function selectCategory(category) {
            if (currentCategory === category) return;
            
            currentCategory = category;
            
            // Atualiza classes dos botões
            document.querySelectorAll('.category-card').forEach(card => {
                card.classList.remove('active');
            });
            document.getElementById(`cat-${category}`).classList.add('active');
            
            // Renderiza o menu
            renderMenu(category);
        }

        function renderMenu(category) {
            const container = document.getElementById('menu-container');
            const items = menuData[category];
            
            if (!items) return;
            
            let html = '';
            
            // Agrupa itens apenas para pastéis
            if (category === 'pasteis') {
                const groups = groupPasteisByType(items);
                
                if (groups.simples.length > 0) {
                    html += `<div class="menu-section-title">Pastéis Simples</div>`;
                    groups.simples.forEach(item => html += renderMenuItem(item));
                }
                
                if (groups.combos.length > 0) {
                    html += `<div class="menu-section-title">Pastéis Combo</div>`;
                    groups.combos.forEach(item => html += renderMenuItem(item));
                }
                
                if (groups.especiais.length > 0) {
                    html += `<div class="menu-section-title">Pastéis Especiais</div>`;
                    groups.especiais.forEach(item => html += renderMenuItem(item));
                }
                
                if (groups.doces.length > 0) {
                    html += `<div class="menu-section-title">Pastéis Doces</div>`;
                    groups.doces.forEach(item => html += renderMenuItem(item));
                }
            } else {
                // Para salgados e bebidas, mostra todos
                items.forEach(item => html += renderMenuItem(item));
            }
            
            container.innerHTML = html;
            
            // Atualiza ícones
            lucide.createIcons();
        }

        function renderMenuItem(item) {
            return `
                <div class="menu-item fade-in">
                    <div class="flex justify-between items-start">
                        <span class="font-medium text-stone-800">${item.name}</span>
                        <span class="price-tag">R$ ${item.price.toFixed(2)}</span>
                    </div>
                    <div class="item-description">${item.description}</div>
                </div>
            `;
        }

        // Inicialização
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            renderMenu('pasteis');
        });
    </script>
</body>
</html>
