<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pastelaria | Cardápio Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fafafa;
        }
        .serif {
            font-family: 'Playfair Display', serif;
        }
        .category-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            min-width: 70px;
        }
        .category-card.active {
            transform: scale(1.02);
            box-shadow: 0 4px 20px -4px rgba(0, 0, 0, 0.08);
        }
        .category-card.active::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 3px;
            background: linear-gradient(to right, #ea580c, #f97316);
            border-radius: 3px;
        }
        .menu-item {
            animation: fadeIn 0.3s ease-out forwards;
            opacity: 0;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .tabular-nums {
            font-variant-numeric: tabular-nums;
        }
        .stagger-1 { animation-delay: 0.03s; }
        .stagger-2 { animation-delay: 0.06s; }
        .stagger-3 { animation-delay: 0.09s; }
        .stagger-4 { animation-delay: 0.12s; }
        .stagger-5 { animation-delay: 0.15s; }
        .stagger-6 { animation-delay: 0.18s; }
        
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #9ca3af;
        }

        .header-bg {
            position: relative;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1604911965086-2b7398fa13f6?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }
        
        .header-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.3) 80%, white);
            pointer-events: none;
        }

        .logo-wrapper {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            background: white;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 3px solid white;
        }

        .logo-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
        }

        /* Compact item styles */
        .compact-item {
            padding: 10px 16px;
            border-bottom: 1px solid #f1f1f1;
            background: white;
        }
        .compact-item:last-child {
            border-bottom: none;
        }
        .item-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .badge {
            font-size: 8px;
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: 600;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            display: inline-block;
        }
        .separator {
            background: linear-gradient(90deg, transparent, rgba(0,0,0,0.05), transparent);
            height: 1px;
            width: 100%;
            margin: 0;
        }
        .separator-text {
            padding: 8px 16px;
            background: #fafafa;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            color: #78716c;
            text-transform: uppercase;
            border-bottom: 1px solid #f1f1f1;
        }
        .additional-info {
            font-size: 9px;
            color: #f97316;
            font-weight: 500;
            margin-left: 4px;
        }
    </style>
</head>
<body class="bg-stone-50 text-stone-800 antialiased">

    <!-- Header Section -->
    <header class="relative w-full">
        <div class="relative w-full h-48 sm:h-56 overflow-hidden">
            <div class="header-bg"></div>
        </div>
        
        <div class="relative px-4 text-center pb-8">
            <div class="flex flex-col items-center">
                <div class="-mt-12 mb-3 relative z-20">
                    <div class="logo-wrapper">
                        <img src="Assets/logo-banner.png" 
                             alt="Pastelaria Logo" 
                             class="logo-image"
                             onerror="this.onerror=null; this.src='https://via.placeholder.com/96x96?text=Pastel'">
                    </div>
                </div>
                
                <h1 class="text-3xl font-bold tracking-tight text-stone-900 serif">Pastelaria</h1>
                <p class="text-xs text-stone-500 uppercase tracking-[0.25em] font-medium mt-1">Pastéis & Salgados</p>
            </div>
        </div>
    </header>

    <!-- Category Selector - 5 Categorias -->
    <section class="sticky top-0 z-40 bg-white/90 backdrop-blur-xl border-b border-stone-100 py-3 px-4">
        <div class="max-w-md mx-auto">
            <div class="flex justify-center gap-2 sm:gap-3">
                <!-- Category 1: Simples -->
                <button onclick="selectCategory('simples')" 
                        id="cat-simples"
                        class="category-card relative flex flex-col items-center gap-1.5 group cursor-pointer p-2.5 rounded-xl active bg-stone-50">
                    <div class="w-12 h-12 sm:w-14 sm:h-14 rounded-xl bg-gradient-to-br from-amber-100 to-orange-50 flex items-center justify-center shadow-sm transition-all group-hover:shadow-md">
                        <i data-lucide="utensils" class="w-6 h-6 text-amber-700"></i>
                    </div>
                    <span class="text-[10px] font-semibold text-stone-800 uppercase tracking-wider">Simples</span>
                </button>

                <!-- Category 2: Especiais -->
                <button onclick="selectCategory('especiais')" 
                        id="cat-especiais"
                        class="category-card relative flex flex-col items-center gap-1.5 group cursor-pointer p-2.5 rounded-xl bg-white hover:bg-stone-50">
                    <div class="w-12 h-12 sm:w-14 sm:h-14 rounded-xl bg-gradient-to-br from-purple-100 to-purple-50 flex items-center justify-center shadow-sm transition-all group-hover:shadow-md">
                        <i data-lucide="star" class="w-6 h-6 text-purple-700"></i>
                    </div>
                    <span class="text-[10px] font-semibold text-stone-500 uppercase tracking-wider">Especiais</span>
                </button>

                <!-- Category 3: Doces -->
                <button onclick="selectCategory('doces')" 
                        id="cat-doces"
                        class="category-card relative flex flex-col items-center gap-1.5 group cursor-pointer p-2.5 rounded-xl bg-white hover:bg-stone-50">
                    <div class="w-12 h-12 sm:w-14 sm:h-14 rounded-xl bg-gradient-to-br from-pink-100 to-pink-50 flex items-center justify-center shadow-sm transition-all group-hover:shadow-md">
                        <i data-lucide="heart" class="w-6 h-6 text-pink-700"></i>
                    </div>
                    <span class="text-[10px] font-semibold text-stone-500 uppercase tracking-wider">Doces</span>
                </button>

                <!-- Category 4: Salgados -->
                <button onclick="selectCategory('salgados')" 
                        id="cat-salgados"
                        class="category-card relative flex flex-col items-center gap-1.5 group cursor-pointer p-2.5 rounded-xl bg-white hover:bg-stone-50">
                    <div class="w-12 h-12 sm:w-14 sm:h-14 rounded-xl bg-gradient-to-br from-stone-100 to-stone-200 flex items-center justify-center shadow-sm transition-all group-hover:shadow-md">
                        <i data-lucide="sandwich" class="w-6 h-6 text-stone-600"></i>
                    </div>
                    <span class="text-[10px] font-semibold text-stone-500 uppercase tracking-wider">Salgados</span>
                </button>

                <!-- Category 5: Bebidas -->
                <button onclick="selectCategory('bebidas')" 
                        id="cat-bebidas"
                        class="category-card relative flex flex-col items-center gap-1.5 group cursor-pointer p-2.5 rounded-xl bg-white hover:bg-stone-50">
                    <div class="w-12 h-12 sm:w-14 sm:h-14 rounded-xl bg-gradient-to-br from-emerald-50 to-teal-100 flex items-center justify-center shadow-sm transition-all group-hover:shadow-md">
                        <i data-lucide="cup-soda" class="w-6 h-6 text-emerald-700"></i>
                    </div>
                    <span class="text-[10px] font-semibold text-stone-500 uppercase tracking-wider">Bebidas</span>
                </button>
            </div>
        </div>
    </section>

    <!-- Menu Content Area -->
    <main class="px-4 py-4 pb-16 max-w-md mx-auto">
        <!-- Category Title -->
        <div class="flex items-center justify-between mb-3">
            <h2 id="current-category-title" class="text-xl font-semibold text-stone-800">Simples</h2>
            <span id="item-count" class="text-xs text-stone-400 font-medium uppercase tracking-wide">27 itens</span>
        </div>

        <!-- Menu List - COMPACTA com TODOS os itens -->
        <div id="menu-container" class="bg-white rounded-xl overflow-hidden shadow-sm">
            <!-- Items will be injected here by JavaScript -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-stone-100 py-4 px-4 mt-2">
        <div class="max-w-md mx-auto text-center">
            <p class="text-[10px] text-stone-400">© 2026 Pastelaria da Mary</p>
        </div>
    </footer>

    <script>
        // Menu Data - Completo com todos os itens do cardápio
        const menuData = {
            simples: [
                // Pastéis Simples - R$ 8,00
                { id: 1, name: "Carne", description: "Carne moída temperada", price: 8.00, tags: ["Simples"], icon: "utensils" },
                { id: 2, name: "Queijo", description: "Mussarela derretido", price: 8.00, tags: ["Simples", "Vegetariano"], icon: "utensils" },
                { id: 3, name: "Frango", description: "Frango desfiado", price: 8.00, tags: ["Simples"], icon: "utensils" },
                { id: 4, name: "Pizza", description: "Molho, queijo e orégano", price: 8.00, tags: ["Simples", "Vegetariano"], icon: "utensils" },
                
                // Separador Combos
                { id: 9991, name: "COMBOS", description: "", price: 0, tags: ["separator"], icon: "zap" },
                
                // Combos - R$ 10,00
                { id: 5, name: "Carne c/ Queijo", description: "Carne moída e mussarela", price: 10.00, tags: ["Combo"], icon: "utensils" },
                { id: 6, name: "Frango c/ Queijo", description: "Frango desfiado + queijo", price: 10.00, tags: ["Combo"], additional: "Adicionais R$ 1,00", icon: "utensils" },
                { id: 7, name: "Frango c/ Catupiry", description: "Frango com requeijão cremoso", price: 10.00, tags: ["Combo"], icon: "utensils" },
                { id: 8, name: "Calabresa c/ Queijo", description: "Calabresa picante e mussarela", price: 10.00, tags: ["Combo"], icon: "utensils" },
                { id: 9, name: "Frango c/ Queijo e Milho", description: "Frango, queijo e milho verde", price: 10.00, tags: ["Combo"], icon: "utensils" }
            ],
            
            especiais: [
                // Separador Especiais
                { id: 9992, name: "ESPECIAIS", description: "", price: 0, tags: ["separator"], icon: "star" },
                
                // Especiais - R$ 15,00
                { id: 11, name: "Costela", description: "Costela desfiada 12hs", price: 15.00, tags: ["Especial"], icon: "star" },
                { id: 12, name: "Costela c/ Queijo", description: "Costela desfiada com queijo", price: 15.00, tags: ["Especial"], icon: "star" },
                { id: 13, name: "Bacon", description: "Bacon crocante", price: 15.00, tags: ["Especial"], additional: "Adicionais R$ 1,00", icon: "star" },
                { id: 14, name: "X-Tudo", description: "Carne, queijo, presunto, calabresa, frango, cheddar, catupiry, ovo", price: 15.00, tags: ["Especial", "Premium"], icon: "star" },
                { id: 15, name: "Strogonoff de Frango", description: "Strogonoff cremoso com champignon", price: 15.00, tags: ["Especial"], icon: "utensils" },
                { id: 16, name: "Carne Seca", description: "Carne seca desfiada", price: 15.00, tags: ["Especial"], additional: "Queijo + R$ 1,00", icon: "star" },
                { id: 17, name: "Pernil", description: "Pernil desfiado", price: 15.00, tags: ["Especial"], icon: "star" },
                { id: 18, name: "Pizza Especial", description: "Presunto, queijo, tomate, ovo, azeitona", price: 15.00, tags: ["Especial"], icon: "utensils" },
                { id: 19, name: "Palmito", description: "Palmito pupunha", price: 15.00, tags: ["Especial", "Vegetariano"], additional: "Queijo + R$ 1,00", icon: "leaf" }
            ],
            
            doces: [
                // Separador Doces
                { id: 9993, name: "DOCES", description: "", price: 0, tags: ["separator"], icon: "heart" },
                
                // Doces - R$ 12,00 / 15,00
                { id: 21, name: "Brigadeiro", description: "Chocolate meio amargo", price: 12.00, tags: ["Doce"], icon: "heart" },
                { id: 22, name: "Prestígio", description: "Coco com chocolate", price: 12.00, tags: ["Doce"], icon: "heart" },
                { id: 23, name: "Doce de Leite", description: "Doce de leite caseiro", price: 12.00, tags: ["Doce"], icon: "heart" },
                { id: 24, name: "Brigadeiro c/ Morango", description: "Com morango fresco", price: 12.00, tags: ["Doce", "Fruta"], icon: "heart" },
                { id: 25, name: "Banana c/ Canela", description: "Banana caramelizada", price: 12.00, tags: ["Doce", "Fruta"], additional: "Chocolate/Doce de leite + R$ 1,00", icon: "apple" },
                { id: 26, name: "Nutella", description: "Creme de avelã", price: 15.00, tags: ["Doce", "Premium"], icon: "sparkles" }
            ],
            
            salgados: [
                { id: 101, name: "Coxinha de Frango", description: "Massa tradicional com frango e catupiry", price: 7.00, tags: ["Frito"], icon: "triangle" },
                { id: 102, name: "Coxinha de Costela", description: "Recheada com costela desfiada", price: 9.00, tags: ["Frito", "Especial"], icon: "beef" },
                { id: 103, name: "Risoles de Presunto/Queijo", description: "Massa leve com presunto e mussarela", price: 7.00, tags: ["Frito"], icon: "circle" },
                { id: 104, name: "Risoles de Carne", description: "Recheado com carne moída", price: 7.00, tags: ["Frito"], icon: "beef" },
                { id: 105, name: "Bolinha de Queijo", description: "Queijo coalho empanado", price: 8.00, tags: ["Frito", "Vegetariano"], icon: "circle" },
                { id: 106, name: "Kibe", description: "Trigo com carne e hortelã", price: 7.00, tags: ["Frito"], icon: "triangle" },
                { id: 107, name: "Kibe c/ Requeijão", description: "Kibe recheado com requeijão", price: 8.00, tags: ["Frito"], icon: "triangle" },
                { id: 108, name: "Esfiha de Carne", description: "Aberta com carne, tomate e cebola", price: 6.00, tags: ["Assado"], icon: "square" },
                { id: 109, name: "Esfiha de Frango", description: "Aberta com frango desfiado", price: 6.00, tags: ["Assado"], icon: "square" },
                { id: 110, name: "Enroladinho de Salsicha", description: "Massa folhada com salsicha", price: 6.00, tags: ["Assado"], icon: "zap" },
                { id: 111, name: "Folhado de Calabresa", description: "Massa folhada com calabresa e queijo", price: 8.00, tags: ["Assado"], icon: "layers" },
                { id: 112, name: "Pão de Queijo", description: "Tradicional mineiro", price: 4.00, tags: ["Assado", "Sem Glúten"], icon: "disc" }
            ],
            
            bebidas: [
                { id: 201, name: "Refrigerante Lata", description: "Coca, Guaraná, Sprite, Fanta (350ml)", price: 6.00, tags: ["Gelado"], icon: "cup-soda" },
                { id: 202, name: "Refrigerante 600ml", description: "Coca-Cola ou Guaraná", price: 9.00, tags: ["Gelado"], icon: "cup-soda" },
                { id: 203, name: "Água sem Gás", description: "500ml", price: 4.00, tags: [], icon: "droplet" },
                { id: 204, name: "Água com Gás", description: "500ml", price: 5.00, tags: ["Gelado"], icon: "droplets" },
                { id: 205, name: "Suco de Laranja", description: "Copo 300ml - natural", price: 9.00, tags: ["Natural", "Gelado"], icon: "sun" },
                { id: 206, name: "Suco de Maracujá", description: "Copo 300ml - natural", price: 9.00, tags: ["Natural", "Gelado"], icon: "sun" },
                { id: 207, name: "Suco de Limão", description: "Copo 300ml com hortelã", price: 8.00, tags: ["Natural", "Gelado"], icon: "sun" },
                { id: 208, name: "Café Expresso", description: "Café forte e encorpado", price: 5.00, tags: ["Quente"], icon: "coffee" },
                { id: 209, name: "Café com Leite", description: "50% café, 50% leite", price: 6.00, tags: ["Quente"], icon: "cup" },
                { id: 210, name: "Chá Gelado", description: "Limão, pêssego ou mate (500ml)", price: 7.00, tags: ["Gelado", "Natural"], icon: "leaf" },
                { id: 211, name: "Caldo de Cana", description: "Copo 300ml - fresco", price: 6.00, tags: ["Natural", "Gelado"], icon: "cup-soda" }
            ]
        };

        const categoryTitles = {
            simples: "Simples",
            especiais: "Especiais",
            doces: "Doces",
            salgados: "Salgados",
            bebidas: "Bebidas"
        };

        let currentCategory = 'simples';

        function selectCategory(category) {
            if (currentCategory === category) return;
            
            currentCategory = category;
            
            document.querySelectorAll('.category-card').forEach(card => {
                card.classList.remove('active', 'bg-stone-50');
                card.classList.add('bg-white');
                const span = card.querySelector('span');
                span.classList.remove('text-stone-800');
                span.classList.add('text-stone-500');
            });
            
            const activeCard = document.getElementById(`cat-${category}`);
            activeCard.classList.add('active', 'bg-stone-50');
            activeCard.classList.remove('bg-white');
            activeCard.querySelector('span').classList.remove('text-stone-500');
            activeCard.querySelector('span').classList.add('text-stone-800');
            
            document.getElementById('current-category-title').textContent = categoryTitles[category];
            
            renderMenu(category);
        }

        function renderMenu(category) {
            const container = document.getElementById('menu-container');
            const items = menuData[category];
            
            // Count only real items (not separators)
            const itemCount = items.filter(item => !item.tags.includes('separator')).length;
            document.getElementById('item-count').textContent = `${itemCount} itens`;
            
            container.innerHTML = '';
            
            items.forEach((item, index) => {
                // If it's a separator, render special separator
                if (item.tags.includes('separator')) {
                    const separator = document.createElement('div');
                    separator.className = `separator-text menu-item ${index < 6 ? `stagger-${index+1}` : 'stagger-6'}`;
                    separator.innerHTML = `
                        <div class="flex items-center justify-center gap-2">
                            <span class="text-sm font-bold text-stone-600 tracking-wider">${item.name}</span>
                        </div>
                    `;
                    container.appendChild(separator);
                    return;
                }
                
                const staggerClass = `stagger-${(index % 6) + 1}`;
                
                const itemDiv = document.createElement('div');
                itemDiv.className = `menu-item compact-item ${staggerClass}`;
                
                // Get icon color based on category
                const iconColors = {
                    simples: 'bg-amber-100 text-amber-700',
                    especiais: 'bg-purple-100 text-purple-700',
                    doces: 'bg-pink-100 text-pink-700',
                    salgados: 'bg-orange-100 text-orange-700',
                    bebidas: 'bg-emerald-100 text-emerald-700'
                };
                
                const tagsHtml = item.tags && item.tags.length > 0 && !item.tags.includes('separator')
                    ? `<div class="flex gap-1 mt-1">
                        ${item.tags.slice(0, 2).map(tag => {
                            const colors = {
                                'Simples': 'bg-stone-100 text-stone-600',
                                'Vegetariano': 'bg-emerald-50 text-emerald-600',
                                'Especial': 'bg-purple-50 text-purple-600',
                                'Premium': 'bg-amber-50 text-amber-600',
                                'Combo': 'bg-blue-50 text-blue-600',
                                'Doce': 'bg-pink-50 text-pink-600',
                                'Frito': 'bg-orange-50 text-orange-600',
                                'Assado': 'bg-yellow-50 text-yellow-600',
                                'Natural': 'bg-teal-50 text-teal-600',
                                'Gelado': 'bg-cyan-50 text-cyan-600',
                                'Quente': 'bg-rose-50 text-rose-600',
                                'Fruta': 'bg-red-50 text-red-600',
                                'Sem Glúten': 'bg-stone-50 text-stone-600'
                            };
                            return `<span class="badge ${colors[tag] || 'bg-stone-50 text-stone-600'}">${tag}</span>`;
                        }).join('')}
                       </div>`
                    : '';
                
                const additionalHtml = item.additional 
                    ? `<span class="additional-info">${item.additional}</span>`
                    : '';
                
                itemDiv.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="item-icon ${iconColors[category]} flex-shrink-0">
                            <i data-lucide="${item.icon}" class="w-5 h-5"></i>
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between items-center">
                                <div class="flex items-center gap-1">
                                    <h3 class="font-medium text-sm text-stone-800">${item.name}</h3>
                                    ${additionalHtml}
                                </div>
                                <span class="font-semibold text-sm text-stone-900 tabular-nums ml-2">R$ ${item.price.toFixed(2)}</span>
                            </div>
                            <p class="text-xs text-stone-500">${item.description}</p>
                            ${tagsHtml}
                        </div>
                    </div>
                `;
                
                container.appendChild(itemDiv);
            });
            
            requestAnimationFrame(() => {
                lucide.createIcons();
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            renderMenu('simples');
        });
    </script>
</body>
</html>
